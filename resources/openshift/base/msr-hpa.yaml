kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: stt-contact-management
  namespace: contact
spec:
  scaleTargetRef:
    kind: Deployment
    name: stt-contact-management
    apiVersion: apps/v1
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 90
